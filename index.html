<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Drop Calc Pro (Estável + Otimizado)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f1a;
    color:white;
}

.topbar{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    z-index:1000;
}

.controls button{
    margin-left:10px;
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#00ffc3,#00aaff);
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

#map{
    height:100vh;
    cursor:crosshair;
}

.info{
    position:absolute;
    bottom:20px;
    left:20px;
    background:rgba(0,0,0,0.5);
    padding:15px;
    border-radius:12px;
}
</style>

</head>

<body>

<div class="topbar">
    <h1>🎯 Drop Calc Pro</h1>
    <div class="controls">
        <button onclick="toggleBusMode()">Definir Ônibus</button>
        <button onclick="resetar()">Reset</button>
    </div>
</div>

<div id="map"></div>

<div class="info">
    <p>📍 <span id="coords">-</span></p>
    <p>📏 <span id="dist">-</span></p>
    <p>⏱ <span id="tempo">-</span></p>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map',{crs:L.CRS.Simple,minZoom:-2,maxZoom:2});
let bounds=[[0,0],[2048,2048]];
L.imageOverlay("mapa.jpg",bounds).addTo(map);
map.fitBounds(bounds);

// ================= HEIGHTMAP =================
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");
let loaded=false;

let img=new Image();
img.src="heightmap.png";

img.onload=()=>{
    canvas.width=img.width;
    canvas.height=img.height;
    ctx.drawImage(img,0,0);
    loaded=true;
};

function getTerrenoReal(lat,lng){
    if(!loaded) return 0;

    let x=Math.floor((lng/2048)*canvas.width);
    let y=Math.floor((lat/2048)*canvas.height);

    // clamp seguro
    x = Math.max(0, Math.min(canvas.width-1, x));
    y = Math.max(0, Math.min(canvas.height-1, y));

    let val=ctx.getImageData(x,y,1,1).data[0]/255;

    return val * 830 - 30;
}

// ================= VAR =================
let busStart=null,busEnd=null,busLine=null;
let markerDrop=null,linha=null,puloMark=null,glideMark=null,finalMark=null;

let modoOnibus=false;

// ================= CLICK =================
map.on('click',e=>{
    if(modoOnibus){
        if(!busStart){
            busStart=[e.latlng.lat,e.latlng.lng];
            L.marker(busStart).addTo(map);
        }else{
            busEnd=[e.latlng.lat,e.latlng.lng];
            L.marker(busEnd).addTo(map);
            busLine=L.polyline([busStart,busEnd],{color:'cyan'}).addTo(map);
            modoOnibus=false;
        }
        return;
    }
    setDrop(e.latlng);
});

// ================= CONTROLES =================
function toggleBusMode(){
    modoOnibus=true;
    busStart=null;
    busEnd=null;
    if(busLine) map.removeLayer(busLine);
}

function resetar(){
    location.reload();
}

// ================= DIST =================
function distancia(a,b){
    let dx=a.lat-b.lat;
    let dy=a.lng-b.lng;
    return Math.sqrt(dx*dx+dy*dy);
}

// ================= SIMULAÇÃO =================
function simular(p, drop){

    let dx = drop.lat - p.lat;
    let dy = drop.lng - p.lng;

    let distTotal = Math.sqrt(dx*dx + dy*dy);

    if(distTotal < 1) return {final: p, glide: null};

    let dirX = dx / distTotal;
    let dirY = dy / distTotal;

    let t = 0;
    let dt = 0.016;

    let dist = 0;
    let vel = 0;

    let glide = false;
    let glidePoint = null;

    while(t < 120){

        let lat = p.lat + dirX * dist;
        let lng = p.lng + dirY * dist;

        let terreno = getTerrenoReal(lat,lng);

        let altura = 800 - (0.5 * 30 * t * t);
        let rel = altura - terreno;

        if(!glide && rel <= 270){
            glide = true;
            glidePoint = {lat,lng};
        }

        if(!glide){
            vel += (35 - vel) * 0.08;
        }else{
            vel += (28 - vel) * 0.05;
        }

        dist += vel * dt;

        if(altura <= terreno){
            return {
                final:{lat,lng},
                glide:glidePoint
            };
        }

        t += dt;
    }

    return {final:drop, glide:glidePoint};
}

// ================= MELHOR PULO =================
function melhorPulo(drop,a,b){

    let best=null,err=999999,bestGlide=null;

    for(let i=0;i<=1;i+=0.02){

        let lat=a[0]+(b[0]-a[0])*i;
        let lng=a[1]+(b[1]-a[1])*i;

        let sim=simular({lat,lng},drop);

        let e=distancia(sim.final,drop);

        if(e<err){
            err=e;
            best={lat,lng};
            bestGlide=sim.glide;
        }
    }

    return {pulo:best,glide:bestGlide};
}

// ================= ROTA =================
function setDrop(p){
    if(markerDrop) map.removeLayer(markerDrop);
    markerDrop=L.marker(p).addTo(map);

    draw(p);
}

function draw(drop){

    if(!busStart||!busEnd) return;

    let data=melhorPulo(drop,busStart,busEnd);
    let pulo=data.pulo;
    let glide=data.glide;

    let sim=simular(pulo,drop);
    let final=sim.final;

    if(linha) map.removeLayer(linha);
    if(puloMark) map.removeLayer(puloMark);
    if(glideMark) map.removeLayer(glideMark);
    if(finalMark) map.removeLayer(finalMark);

    linha=L.polyline([[pulo.lat,pulo.lng],[drop.lat,drop.lng]],{
        color:'#00e0ff',
        dashArray:'10,10',
        weight:4
    }).addTo(map);

    puloMark=L.circleMarker([pulo.lat,pulo.lng],{
        radius:8,
        color:'red',
        fillColor:'red',
        fillOpacity:1
    }).addTo(map);

    L.tooltip({permanent:true})
    .setContent("Best Time to Jump")
    .setLatLng([pulo.lat,pulo.lng])
    .addTo(map);

    if(glide){
        glideMark=L.circleMarker([glide.lat,glide.lng],{
            radius:8,
            color:'lime',
            fillColor:'lime',
            fillOpacity:1
        }).addTo(map);

        L.tooltip({permanent:true})
        .setContent("Best Autoredeploy Point")
        .setLatLng([glide.lat,glide.lng])
        .addTo(map);
    }

    finalMark=L.circleMarker([final.lat,final.lng],{
        radius:8,
        color:'blue',
        fillColor:'blue',
        fillOpacity:1
    }).addTo(map);

    document.getElementById("coords").innerText =
        `${drop.lat.toFixed(0)}, ${drop.lng.toFixed(0)}`;

    document.getElementById("dist").innerText =
        distancia(drop,final).toFixed(0)+" m";

    document.getElementById("tempo").innerText =
        "simulado";
}

</script>

</body>
</html>
