<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Drop Calc Pro (Física Real)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f1a;
    color:white;
}

.topbar{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:10px 20px;
    background:rgba(0,0,0,0.4);
    z-index:1000;
}

button{
    margin-left:10px;
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#00ffc3,#00aaff);
    font-weight:bold;
    cursor:pointer;
}

#map{
    height:100vh;
}

.info{
    position:absolute;
    bottom:20px;
    left:20px;
    background:rgba(0,0,0,0.5);
    padding:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>🎯 Drop Calc Pro</h2>
    <div>
        <button onclick="toggleBusMode()">Definir Ônibus</button>
        <button onclick="resetar()">Reset</button>
    </div>
</div>

<div id="map"></div>

<div class="info">
    <p>📍 <span id="coords">-</span></p>
    <p>📏 <span id="dist">-</span></p>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map',{crs:L.CRS.Simple,minZoom:-2,maxZoom:2});
let bounds=[[0,0],[2048,2048]];
L.imageOverlay("mapa.jpg",bounds).addTo(map);
map.fitBounds(bounds);

// ================= HEIGHTMAP =================
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");
let loaded=false;

let img=new Image();
img.src="heightmap.png";

img.onload=()=>{
    canvas.width=img.width;
    canvas.height=img.height;
    ctx.drawImage(img,0,0);
    loaded=true;
};

function getTerreno(lat,lng){
    if(!loaded) return 0;

    let x=Math.floor((lng/2048)*canvas.width);
    let y=Math.floor((lat/2048)*canvas.height);

    let val=ctx.getImageData(x,y,1,1).data[0]/255;

    return val * 830 - 30;
}

// ================= VAR =================
let busStart=null,busEnd=null,busLine=null;
let markerDrop=null,puloMark=null,glideMark=null,finalMark=null;

let modoOnibus=false;

// ================= CLICK =================
map.on('click',e=>{

    if(modoOnibus){

        if(!busStart){
            busStart=[e.latlng.lat,e.latlng.lng];
            L.marker(busStart).addTo(map);
        }else{
            busEnd=[e.latlng.lat,e.latlng.lng];
            L.marker(busEnd).addTo(map);

            if(busLine) map.removeLayer(busLine);
            busLine=L.polyline([busStart,busEnd],{color:'cyan'}).addTo(map);

            modoOnibus=false;
        }

        return;
    }

    setDrop(e.latlng);
});

// ================= CONTROLES =================
function toggleBusMode(){
    modoOnibus=true;
    busStart=null;
    busEnd=null;
    if(busLine) map.removeLayer(busLine);
}

function resetar(){
    location.reload();
}

// ================= DIST =================
function distancia(a,b){
    let dx=a.lat-b.lat;
    let dy=a.lng-b.lng;
    return Math.sqrt(dx*dx+dy*dy);
}

// ================= SIMULAÇÃO REAL =================
function simular(p, drop){

    let dx = drop.lat - p.lat;
    let dy = drop.lng - p.lng;

    let distTotal = Math.sqrt(dx*dx + dy*dy);

    let angle = Math.atan2(dy, dx);

    let t = 0, dt = 0.016;
    let dist = 0, vel = 0;

    let glide = false;
    let glidePoint = null;

    for(let i=0;i<10000;i++){

        // curva leve (simula arrasto real)
        angle += (Math.random()-0.5) * 0.01;

        let dirX = Math.cos(angle);
        let dirY = Math.sin(angle);

        let lat = p.lat + dirX * dist;
        let lng = p.lng + dirY * dist;

        if(isNaN(lat)||isNaN(lng)) break;

        let terreno = getTerreno(lat,lng);

        // gravidade mais real
        let altura = 800 - (0.5 * 30 * t * t);

        let rel = altura - terreno;

        // glide baseado em altura + velocidade
        if(!glide && rel <= 270 + vel*2){
            glide=true;
            glidePoint={lat,lng};
        }

        // aceleração mais real
        if(!glide){
            vel += (35 - vel)*0.08;
        }else{
            vel += (28 - vel)*0.05;
        }

        dist += vel * dt;

        if(altura <= terreno){
            return {final:{lat,lng}, glide:glidePoint};
        }

        t+=dt;
    }

    return {final:drop, glide:glidePoint};
}

// ================= MELHOR PULO =================
function melhorPulo(drop,a,b){

    let best=null,err=999999;

    for(let i=0;i<=1;i+=0.02){

        let lat=a[0]+(b[0]-a[0])*i;
        let lng=a[1]+(b[1]-a[1])*i;

        let sim=simular({lat,lng},drop);

        let erroFinal = distancia(sim.final, drop);

        let erroGlide = sim.glide
            ? distancia(sim.glide, drop) * 0.3
            : 100;

        let erro = erroFinal + erroGlide;

        if(erro<err){
            err=erro;
            best={lat,lng};
        }
    }

    return best;
}

// ================= DRAW =================
function setDrop(p){
    if(markerDrop) map.removeLayer(markerDrop);
    markerDrop=L.marker(p).addTo(map);

    draw(p);
}

function draw(drop){

    if(!busStart||!busEnd) return;

    let pulo=melhorPulo(drop,busStart,busEnd);

    let sim=simular(pulo,drop);

    let glide=sim.glide;
    let final=sim.final;

    if(puloMark) map.removeLayer(puloMark);
    if(glideMark) map.removeLayer(glideMark);
    if(finalMark) map.removeLayer(finalMark);

    map.eachLayer(l=>{
        if(l instanceof L.Tooltip) map.removeLayer(l);
    });

    puloMark=L.circleMarker([pulo.lat,pulo.lng],{color:'red'}).addTo(map);
    finalMark=L.circleMarker([final.lat,final.lng],{color:'blue'}).addTo(map);

    if(glide){
        glideMark=L.circleMarker([glide.lat,glide.lng],{color:'lime'}).addTo(map);
    }

    L.tooltip({permanent:true}).setContent("Jump").setLatLng(pulo).addTo(map);

    if(glide){
        L.tooltip({permanent:true}).setContent("Glide").setLatLng(glide).addTo(map);
    }

    document.getElementById("coords").innerText =
        `${drop.lat.toFixed(0)}, ${drop.lng.toFixed(0)}`;

    document.getElementById("dist").innerText =
        distancia(drop,final).toFixed(0)+" m";
}

</script>

</body>
</html>
